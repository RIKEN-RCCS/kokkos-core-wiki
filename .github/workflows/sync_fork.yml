name: Sync fork from upstream

on:
  schedule:
    - cron: '0 15 * * *'  # once a day at 00:00 JST (15:00 UTC previous day)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sync main with upstream (kokkos/kokkos-core-wiki)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync ${{ github.repository }} --branch main
